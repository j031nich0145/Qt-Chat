<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<script src="marked.min.js"></script>
<style>
  :root {
    --bg: #1e1e2e;
    --text: #cdd6f4;
    --surface: #313244;
    --accent: #89b4fa;
    --font: sans-serif;
    --size: 11pt;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: var(--size);
    margin: 0;
    padding: 16px;
  }
  .row { display: flex; margin: 8px 0; }
  .row.user { justify-content: flex-end; }
  .row.assistant { justify-content: flex-start; }
  .bubble {
    max-width: 70%;
    padding: 2px 14px;
    border-radius: 16px;
    word-wrap: break-word;
    overflow-wrap: break-word;
  }
  .bubble.user { background: var(--accent); color: var(--bg); }
  .bubble.assistant { background: var(--surface); color: var(--text); }
  .bubble p { margin: 8px 0; }
  .bubble pre {
    background: rgba(0,0,0,0.25);
    padding: 10px;
    border-radius: 8px;
    overflow-x: auto;
  }
  .bubble code {
    background: rgba(0,0,0,0.25);
    padding: 2px 5px;
    border-radius: 4px;
    font-family: monospace;
  }
  .bubble pre code { background: none; padding: 0; }
  .bubble table { border-collapse: collapse; margin: 8px 0; }
  .bubble th, .bubble td {
    border: 1px solid rgba(128,128,128,0.4);
    padding: 4px 8px;
  }
</style>
</head>
<body>
<div id="chat"></div>
<div id="anchor" style="overflow-anchor:auto; height:1px;"></div>

<script>
  function setTheme(bg, text, surface, accent, font, size) {
    const r = document.documentElement.style;
    r.setProperty('--bg', bg);
    r.setProperty('--text', text);
    r.setProperty('--surface', surface);
    r.setProperty('--accent', accent);
    r.setProperty('--font', font);
    r.setProperty('--size', size + 'pt');
  }

  function render(messagesJson) {
    const messages = JSON.parse(messagesJson);
    const chat = document.getElementById('chat');
    chat.innerHTML = '';

    for (const msg of messages) {
      const role = msg.role;
      const row = document.createElement('div');
      row.className = 'row ' + role;

      const bubble = document.createElement('div');
      bubble.className = 'bubble ' + role;
      bubble.innerHTML = marked.parse(msg.content || '');

      row.appendChild(bubble);
      chat.appendChild(row);
    }

    window.scrollTo(0, document.body.scrollHeight);
  }
</script>
</body>
</html>
